name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this pipeline only needs to read the repo.
permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        # Placeholder — a real test runner (Vitest) lands in a later SUB-PR.
        # `npm test` currently echoes and exits 0 so the pipeline structure
        # (and any branch-protection rules pinned to this step) are stable.
        run: npm test

      - name: DB migration (Drizzle)
        # Applies committed migrations under ./drizzle to the production DB.
        # Gated on the DATABASE_URL secret being configured in GitHub Actions
        # (Settings → Secrets and variables → Actions). If the secret is unset,
        # the step warns and exits cleanly so this CI run is not blocked while
        # Neon credentials are being provisioned. Once DATABASE_URL is set,
        # migrations apply automatically on every push to main.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning title=DB migration skipped::DATABASE_URL secret is not yet configured in GitHub Actions. Set it in Settings → Secrets and variables → Actions to enable automatic migrations."
            exit 0
          fi
          npm run db:migrate

      - name: Build
        run: npm run build

      - name: Preview deploy (Vercel — handled natively by the GitHub integration)
        # Vercel's native GitHub integration deploys a preview on every PR
        # out-of-the-box, so no CI step is required here. If this repo is ever
        # disconnected from Vercel, replace this echo with explicit CLI steps:
        #   - vercel pull   --yes --environment=preview --token=$VERCEL_TOKEN
        #   - vercel build  --token=$VERCEL_TOKEN
        #   - vercel deploy --prebuilt --token=$VERCEL_TOKEN
        # using VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID GitHub secrets.
        if: github.event_name == 'pull_request'
        run: |
          echo "::notice title=Preview deploy::Handled by Vercel's native GitHub integration. See workflow comments to switch to explicit CLI deploy."
